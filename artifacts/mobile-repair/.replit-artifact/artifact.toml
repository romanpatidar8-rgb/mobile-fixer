kind = "web"
previewPath = "/"
title = "Rajesh Patidar Mobile Repair"
version = "1.0.0"
id = "artifacts/mobile-repair"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20705

[services.development]
run = "pnpm --filter @workspace/mobile-repair run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile-repair", "run", "build" ]
publicDir = "artifacts/mobile-repair/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20705"
BASE_PATH = "/"
